<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sentiment Engine — Debugging.My Thoughts</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=DM+Sans:wght@300;400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0e0e0e;
      --surface: #161616;
      --surface2: #1c1c1c;
      --accent: #c9a84c;
      --text: #f0ece4;
      --muted: #7a7570;
      --border: #2a2a2a;
      --bullish: #4ade80;
      --bearish: #f87171;
      --neutral: #94a3b8;
      --bullish-bg: rgba(74, 222, 128, 0.06);
      --bearish-bg: rgba(248, 113, 113, 0.06);
      --neutral-bg: rgba(148, 163, 184, 0.06);
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
    }

    /* NAV */
    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 28px 60px;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      background: rgba(14,14,14,0.95);
      backdrop-filter: blur(12px);
      z-index: 100;
    }
    .logo {
      font-family: 'Playfair Display', serif;
      font-size: 1.5rem;
      font-weight: 900;
      letter-spacing: -0.02em;
      color: var(--text);
      text-decoration: none;
    }
    .logo span { color: var(--accent); }
    .back-btn {
      color: var(--muted);
      text-decoration: none;
      font-size: 0.875rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      transition: color 0.2s;
    }
    .back-btn:hover { color: var(--accent); }

    /* PAGE HEADER */
    .page-header {
      padding: 64px 60px 48px;
      border-bottom: 1px solid var(--border);
      animation: fadeUp 0.6s ease both;
    }
    .page-label {
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 16px;
      font-weight: 500;
    }
    .page-title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2rem, 4vw, 3rem);
      font-weight: 900;
      letter-spacing: -0.02em;
      margin-bottom: 12px;
    }
    .page-title em { font-style: italic; color: var(--accent); }
    .page-sub { color: var(--muted); font-size: 0.95rem; }

    /* MAIN CONTENT */
    .content {
      padding: 56px 60px;
      max-width: 1000px;
      animation: fadeUp 0.6s ease 0.1s both;
    }

    /* SEARCH BAR */
    .search-row {
      display: flex;
      gap: 0;
      margin-bottom: 48px;
    }
    .stock-input {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-right: none;
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      font-size: 1.1rem;
      padding: 16px 20px;
      outline: none;
      transition: border-color 0.2s;
    }
    .stock-input::placeholder { color: #3a3630; }
    .stock-input:focus { border-color: var(--accent); }
    .analyze-btn {
      padding: 16px 32px;
      background: var(--accent);
      color: #0e0e0e;
      border: none;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.875rem;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      transition: opacity 0.2s;
      white-space: nowrap;
    }
    .analyze-btn:hover { opacity: 0.88; }
    .analyze-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* QUICK CHIPS */
    .quick-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 14px;
      margin-bottom: 40px;
    }
    .chip {
      padding: 6px 14px;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.75rem;
      cursor: pointer;
      transition: all 0.15s;
    }
    .chip:hover { border-color: var(--accent); color: var(--accent); }

    /* RESULT CARD */
    .result-card {
      display: none;
      border: 1px solid var(--border);
      background: var(--surface);
      animation: fadeUp 0.5s ease both;
    }
    .result-card.visible { display: block; }
    .result-card.bullish { border-color: rgba(74,222,128,0.3); background: var(--bullish-bg); }
    .result-card.bearish { border-color: rgba(248,113,113,0.3); background: var(--bearish-bg); }
    .result-card.neutral { border-color: rgba(148,163,184,0.3); background: var(--neutral-bg); }

    .result-top {
      padding: 32px 36px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 32px;
      align-items: start;
      border-bottom: 1px solid var(--border);
    }

    .result-stock-name {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.7rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .result-sentiment {
      font-family: 'Playfair Display', serif;
      font-size: 2.8rem;
      font-weight: 900;
      letter-spacing: -0.02em;
      line-height: 1;
      margin-bottom: 12px;
    }
    .result-card.bullish .result-sentiment { color: var(--bullish); }
    .result-card.bearish .result-sentiment { color: var(--bearish); }
    .result-card.neutral  .result-sentiment { color: var(--neutral); }

    .result-reasoning {
      color: var(--muted);
      font-size: 0.9rem;
      font-style: italic;
      line-height: 1.5;
    }

    /* SENTIMENT METER (gauge) */
    .meter-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      min-width: 160px;
    }
    .meter-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.6rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .gauge-svg { overflow: visible; }
    .gauge-track {
      fill: none;
      stroke: var(--border);
      stroke-width: 10;
      stroke-linecap: round;
    }
    .gauge-fill {
      fill: none;
      stroke-width: 10;
      stroke-linecap: round;
      transition: stroke-dashoffset 1s cubic-bezier(0.4, 0, 0.2, 1),
                  stroke 0.4s ease;
      stroke-dasharray: 220;
      stroke-dashoffset: 220;
    }
    .gauge-pct {
      font-family: 'Playfair Display', serif;
      font-size: 1.6rem;
      font-weight: 900;
      fill: var(--text);
      text-anchor: middle;
      dominant-baseline: middle;
    }
    .gauge-sub {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.55rem;
      fill: var(--muted);
      text-anchor: middle;
      dominant-baseline: middle;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    /* HEADLINES */
    .result-headlines {
      padding: 24px 36px;
    }
    .headlines-label {
      font-size: 0.65rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 16px;
    }
    .headline-item {
      display: flex;
      gap: 12px;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
      font-size: 0.85rem;
      color: #b0aca4;
      line-height: 1.4;
      opacity: 0;
      transform: translateX(-6px);
      animation: slideIn 0.3s ease forwards;
    }
    .headline-item:last-child { border-bottom: none; }
    .headline-num {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.65rem;
      color: var(--muted);
      min-width: 24px;
      margin-top: 2px;
    }

    /* LOADING STATE */
    .loading {
      display: none;
      padding: 48px;
      text-align: center;
      border: 1px solid var(--border);
      background: var(--surface);
    }
    .loading.visible { display: block; }
    .spinner {
      width: 32px;
      height: 32px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }
    .loading-text {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.75rem;
      color: var(--muted);
      letter-spacing: 0.08em;
    }
    .loading-steps { margin-top: 12px; }
    .loading-step {
      font-size: 0.75rem;
      color: var(--border);
      padding: 3px 0;
      transition: color 0.3s;
    }
    .loading-step.active { color: var(--accent); }
    .loading-step.done { color: var(--muted); }

    /* ERROR */
    .error-msg {
      display: none;
      padding: 20px 24px;
      border: 1px solid rgba(248,113,113,0.3);
      background: rgba(248,113,113,0.05);
      color: var(--bearish);
      font-size: 0.85rem;
      font-family: 'JetBrains Mono', monospace;
      margin-bottom: 24px;
    }
    .error-msg.visible { display: block; }

    /* ANIMATIONS */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes slideIn {
      to { opacity: 1; transform: translateX(0); }
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @media (max-width: 768px) {
      nav { padding: 20px 24px; }
      .page-header { padding: 40px 24px 32px; }
      .content { padding: 36px 24px; }
      .result-top { grid-template-columns: 1fr; }
      .meter-wrap { flex-direction: row; min-width: auto; }
    }
  </style>
</head>
<body>

  <nav>
    <a class="logo" href="/">Debugging<span>.</span>My Thoughts</a>
    <a class="back-btn" href="/">← Back</a>
  </nav>

  <header class="page-header">
    <p class="page-label">✦ AI-Powered</p>
    <h1 class="page-title">Stock Sentiment <em>Engine</em></h1>
    <p class="page-sub">Scrapes live news → asks NVIDIA NIM → returns Bullish / Bearish / Neutral</p>
  </header>

  <main class="content">

    <!-- SEARCH -->
    <div class="search-row">
      <input class="stock-input" id="stockInput"
             type="text" placeholder="Enter stock name... e.g. Zomato"
             autocomplete="off" spellcheck="false"/>
      <button class="analyze-btn" id="analyzeBtn" onclick="analyze()">✦ Analyze</button>
    </div>

    <!-- QUICK CHIPS -->
    <div class="quick-chips">
      <button class="chip" onclick="setStock('Zomato')">Zomato</button>
      <button class="chip" onclick="setStock('Reliance Industries')">Reliance</button>
      <button class="chip" onclick="setStock('Infosys')">Infosys</button>
      <button class="chip" onclick="setStock('HDFC Bank')">HDFC Bank</button>
      <button class="chip" onclick="setStock('Tata Motors')">Tata Motors</button>
      <button class="chip" onclick="setStock('Wipro')">Wipro</button>
      <button class="chip" onclick="setStock('ONGC')">ONGC</button>
    </div>

    <!-- ERROR -->
    <div class="error-msg" id="errorMsg"></div>

    <!-- LOADING -->
    <div class="loading" id="loadingBox">
      <div class="spinner"></div>
      <div class="loading-text">Analyzing sentiment...</div>
      <div class="loading-steps">
        <div class="loading-step" id="step1">① Scraping Google News headlines</div>
        <div class="loading-step" id="step2">② Sending to NVIDIA NIM model</div>
        <div class="loading-step" id="step3">③ Parsing sentiment result</div>
      </div>
    </div>

    <!-- RESULT CARD -->
    <div class="result-card" id="resultCard">
      <div class="result-top">
        <div>
          <div class="result-stock-name" id="resultStock"></div>
          <div class="result-sentiment" id="resultSentiment"></div>
          <div class="result-reasoning" id="resultReasoning"></div>
        </div>
        <!-- GAUGE METER -->
        <div class="meter-wrap">
          <div class="meter-label">Confidence</div>
          <svg class="gauge-svg" width="160" height="100" viewBox="0 0 160 100">
            <!-- semicircle track -->
            <path class="gauge-track"
              d="M 20 90 A 60 60 0 0 1 140 90"
              stroke-dasharray="220" stroke-dashoffset="0"/>
            <!-- fill arc -->
            <path class="gauge-fill" id="gaugeFill"
              d="M 20 90 A 60 60 0 0 1 140 90"/>
            <!-- center text -->
            <text class="gauge-pct" id="gaugePct" x="80" y="78">0%</text>
            <text class="gauge-sub" x="80" y="95">confidence</text>
          </svg>
        </div>
      </div>
      <!-- HEADLINES -->
      <div class="result-headlines">
        <div class="headlines-label">Headlines analyzed</div>
        <div id="headlinesList"></div>
      </div>
    </div>

  </main>

  <script>
    const SENTIMENT_COLORS = {
      Bullish: getComputedStyle(document.documentElement).getPropertyValue('--bullish').trim() || '#4ade80',
      Bearish: getComputedStyle(document.documentElement).getPropertyValue('--bearish').trim() || '#f87171',
      Neutral: getComputedStyle(document.documentElement).getPropertyValue('--neutral').trim() || '#94a3b8',
    };

    function setStock(name) {
      document.getElementById('stockInput').value = name;
      analyze();
    }

    function showError(msg) {
      const el = document.getElementById('errorMsg');
      el.textContent = '✕ ' + msg;
      el.classList.add('visible');
    }
    function hideError() {
      document.getElementById('errorMsg').classList.remove('visible');
    }

    function setStep(n) {
      [1,2,3].forEach(i => {
        const el = document.getElementById('step' + i);
        if (i < n)  el.className = 'loading-step done';
        else if (i === n) el.className = 'loading-step active';
        else el.className = 'loading-step';
      });
    }

    function animateGauge(pct, sentiment) {
      const arc     = 220;
      const fill    = arc - (pct / 100) * arc;
      const gaugeFill = document.getElementById('gaugeFill');
      const gaugePct  = document.getElementById('gaugePct');

      gaugeFill.style.stroke = SENTIMENT_COLORS[sentiment] || '#94a3b8';
      // trigger reflow so transition fires
      gaugeFill.style.strokeDashoffset = arc;
      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          gaugeFill.style.strokeDashoffset = fill;
          gaugePct.textContent = pct + '%';
        });
      });
    }

    async function analyze() {
      const stock = document.getElementById('stockInput').value.trim();
      if (!stock) return;

      hideError();
      document.getElementById('resultCard').className = 'result-card';
      document.getElementById('loadingBox').classList.add('visible');
      document.getElementById('analyzeBtn').disabled = true;

      // Animate loading steps
      setStep(1);
      setTimeout(() => setStep(2), 800);
      setTimeout(() => setStep(3), 1800);

      try {
        const res  = await fetch(`/api/sentiment?stock=${encodeURIComponent(stock)}`);
        const data = await res.json();

        document.getElementById('loadingBox').classList.remove('visible');

        if (data.error) {
          showError(data.error);
          document.getElementById('analyzeBtn').disabled = false;
          return;
        }

        const sentiment = data.sentiment || 'Neutral';
        const card      = document.getElementById('resultCard');

        card.className = 'result-card visible ' + sentiment.toLowerCase();
        document.getElementById('resultStock').textContent     = data.stock.toUpperCase();
        document.getElementById('resultSentiment').textContent = sentiment;
        document.getElementById('resultReasoning').textContent = data.reasoning || '';

        animateGauge(data.confidence || 0, sentiment);

        // Headlines
        const list = document.getElementById('headlinesList');
        list.innerHTML = '';
        (data.headlines || []).forEach((h, i) => {
          const div = document.createElement('div');
          div.className = 'headline-item';
          div.style.animationDelay = (i * 0.06) + 's';
          div.innerHTML = `<span class="headline-num">${String(i+1).padStart(2,'0')}</span><span>${h}</span>`;
          list.appendChild(div);
        });

      } catch (e) {
        document.getElementById('loadingBox').classList.remove('visible');
        showError('Network error. Is Flask running?');
      }

      document.getElementById('analyzeBtn').disabled = false;
    }

    // Enter key triggers analyze
    document.getElementById('stockInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') analyze();
    });
  </script>

</body>
</html>
